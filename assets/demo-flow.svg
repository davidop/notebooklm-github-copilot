<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#f8f9fa"/>

  <!-- User box -->
  <rect x="20" y="70" width="120" height="60" rx="6" fill="#e8f4fd" stroke="#2196f3" stroke-width="2"/>
  <text x="80" y="96" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">User</text>
  <text x="80" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Copilot Chat</text>

  <!-- Arrow 1 -->
  <line x1="140" y1="100" x2="188" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="164" y="93" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">prompt</text>

  <!-- Copilot box -->
  <rect x="190" y="70" width="140" height="60" rx="6" fill="#e8fde8" stroke="#4caf50" stroke-width="2"/>
  <text x="260" y="96" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">GitHub Copilot</text>
  <text x="260" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">MCP client</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="100" x2="378" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="354" y="93" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">query</text>

  <!-- MCP box -->
  <rect x="380" y="70" width="120" height="60" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">MCP Server</text>
  <text x="440" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">bridge</text>

  <!-- Arrow 3 -->
  <line x1="500" y1="100" x2="548" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="524" y="93" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">API call</text>

  <!-- NotebookLM box -->
  <rect x="550" y="70" width="140" height="60" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="620" y="96" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">NotebookLM</text>
  <text x="620" y="114" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">source store</text>

  <!-- Arrow 4 (return) -->
  <line x1="620" y1="140" x2="260" y2="155" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow2)"/>
  <text x="440" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">cited response</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">NotebookLM + GitHub Copilot — Demo Flow</text>
</svg>
