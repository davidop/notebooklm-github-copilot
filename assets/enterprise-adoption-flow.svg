<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200">
  <rect width="880" height="200" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="440" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#333" font-weight="bold">Adoption Maturity Model</text>

  <!-- Level 0 -->
  <rect x="20" y="50" width="140" height="100" rx="6" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="2"/>
  <text x="90" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666" font-weight="bold">Level 0</text>
  <text x="90" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">Ad hoc</text>
  <text x="90" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">local</text>
  <text x="90" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">experiments</text>

  <!-- Arrow -->
  <line x1="160" y1="100" x2="188" y2="100" stroke="#bbb" stroke-width="2" marker-end="url(#a0)"/>

  <!-- Level 1 -->
  <rect x="190" y="50" width="140" height="100" rx="6" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
  <text x="260" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1565c0" font-weight="bold">Level 1</text>
  <text x="260" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Individual</text>
  <text x="260" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">developer</text>
  <text x="260" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">setup</text>

  <!-- Arrow -->
  <line x1="330" y1="100" x2="358" y2="100" stroke="#bbb" stroke-width="2" marker-end="url(#a0)"/>

  <!-- Level 2 -->
  <rect x="360" y="50" width="140" height="100" rx="6" fill="#e8f5e9" stroke="#4caf50" stroke-width="2"/>
  <text x="430" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2e7d32" font-weight="bold">Level 2</text>
  <text x="430" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Team-shared</text>
  <text x="430" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">prompts and</text>
  <text x="430" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">recipes</text>

  <!-- Arrow -->
  <line x1="500" y1="100" x2="528" y2="100" stroke="#bbb" stroke-width="2" marker-end="url(#a0)"/>

  <!-- Level 3 -->
  <rect x="530" y="50" width="140" height="100" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
  <text x="600" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e65100" font-weight="bold">Level 3</text>
  <text x="600" y="98" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Governed</text>
  <text x="600" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">enterprise</text>
  <text x="600" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">rollout</text>

  <!-- Arrow -->
  <line x1="670" y1="100" x2="698" y2="100" stroke="#bbb" stroke-width="2" marker-end="url(#a0)"/>

  <!-- Level 4 -->
  <rect x="700" y="50" width="160" height="100" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="2"/>
  <text x="780" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#880e4f" font-weight="bold">Level 4</text>
  <text x="780" y="96" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Evaluated and</text>
  <text x="780" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">continuously</text>
  <text x="780" y="128" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">improved</text>

  <defs>
    <marker id="a0" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- Labels at bottom -->
  <text x="440" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999">Increasing maturity →</text>
</svg>
